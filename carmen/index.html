<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carmen</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <canvas id="globe"></canvas>
  <div id="loading">loading</div>
  <div id="history"></div>
  <div id="drawer">
    <div id="drawer-handle">
      <div id="drawer-pip"></div>
      <span id="drawer-peek"></span>
    </div>
    <div id="drawer-list"></div>
  </div>
  <div id="win">
    <div id="win-name"></div>
    <div id="win-score"></div>
  </div>
  <button id="play-again" onclick="location.reload()">play again</button>
  <div id="ui">
    <div id="counter"><span id="count">0</span> guesses</div>
    <div id="feedback"></div>
    <form id="form">
      <input id="guess" type="text" autocomplete="off" spellcheck="false" placeholder="guess a country…">
    </form>
  </div>
  <script src="app.js?v=3"></script>
</body>
</html>
